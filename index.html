<!DOCTYPE html>
<html lang="hu">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />

  <title>MeloGo — Hamarosan indul</title>
  <meta name="description" content="Az első magyar app ahol percek alatt találsz házkörüli melót vagy megbízható melóst a közeledben." />
  <meta property="og:title" content="MeloGo — Hamarosan indul" />
  <meta property="og:description" content="Vállalj melót a közeledben. Hamarosan elérhető." />
  <meta property="og:image" content="logo.jpg" />
  <meta name="theme-color" content="#04040A" />

  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@200;300;400;600&display=swap" rel="stylesheet" />

  <style>
    /* ── Reset ── */
    *, *::before, *::after {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    html, body {
      width: 100%;
      min-height: 100vh;
      overflow-x: hidden;
      background: linear-gradient(to bottom, #04040A 0%, #050918 50%, #060D22 100%);
      color: #ffffff;
      font-family: 'Inter', sans-serif;
      display: flex;
      flex-direction: column;
    }

    /* ── Background glow ── */
    .bg-glow {
      position: fixed;
      inset: 0;
      pointer-events: none;
      z-index: 0;
      background: radial-gradient(ellipse 60% 50% at 50% 40%, rgba(179,255,0,0.03) 0%, transparent 60%);
      animation: glow-pulse 6s ease-in-out infinite;
    }
    @keyframes glow-pulse {
      0%, 100% { transform: scale(1); opacity: 1; }
      50% { transform: scale(1.05); opacity: 0.6; }
    }

    /* ── Layout ── */
    .page-wrapper {
      position: relative;
      z-index: 1;
      display: flex;
      flex-direction: column;
      flex: 1;
      padding: 40px 0;
    }

    /* ── Header / Logo ── */
    .header {
      display: flex;
      flex-direction: column;
      align-items: center;
      margin-bottom: 40px;
    }
    .logo {
      width: 160px;
      height: auto;
      border-radius: 32px;
      filter: drop-shadow(0 10px 30px rgba(179,255,0,0.1));
    }
    .tagline {
      margin-top: 24px;
      font-size: 20px;
      font-weight: 300;
      letter-spacing: -0.5px;
      color: rgba(255,255,255,0.8);
      text-align: center;
      padding: 0 20px;
    }
    .subtext {
      margin-top: 12px;
      font-size: 15px;
      font-weight: 300;
      color: rgba(255,255,255,0.4);
      text-align: center;
      max-width: 440px;
      line-height: 1.6;
      padding: 0 20px;
    }

    /* ── Screens Marquee ── */
    .showcase {
      flex: 1;
      display: flex;
      align-items: center;
      position: relative;
      width: 100%;
      overflow: hidden;
      margin: 40px 0;
      /* subtle masks for left/right fade */
      mask-image: linear-gradient(to right, transparent, black 10%, black 90%, transparent);
      -webkit-mask-image: linear-gradient(to right, transparent, black 10%, black 90%, transparent);
    }
    
    .marquee-track {
      display: flex;
      gap: 24px;
      padding: 0 12px;
      width: max-content;
      animation: scroll 30s linear infinite;
    }

    /* Pause on hover */
    .showcase:hover .marquee-track {
      animation-play-state: paused;
    }

    @keyframes scroll {
      0% { transform: translateX(0); }
      100% { transform: translateX(calc(-50% - 12px)); }
    }

    .screen-card {
      height: 480px;
      width: auto;
      aspect-ratio: 1179 / 2556; /* iPhone 14/15/16 Pro ratio roughly */
      border-radius: 32px;
      border: 1px solid rgba(255,255,255,0.1);
      box-shadow: 0 24px 48px rgba(0,0,0,0.6);
      object-fit: cover;
      background: #000;
      transition: transform 0.4s cubic-bezier(0.2, 0.8, 0.2, 1);
    }
    
    .screen-card:hover {
      transform: translateY(-10px) scale(1.02);
      border-color: rgba(179,255,0,0.3);
      box-shadow: 0 30px 60px rgba(179,255,0,0.15);
    }

    /* ── Bottom Section ── */
    .bottom-section {
      display: flex;
      flex-direction: column;
      align-items: center;
      margin-top: auto;
      padding: 0 20px 20px;
    }

    .coming-soon-wrapper {
      display: flex;
      align-items: center;
      gap: 12px;
      margin-bottom: 24px;
      background: rgba(255,255,255,0.03);
      border: 1px solid rgba(255,255,255,0.08);
      padding: 12px 24px;
      border-radius: 100px;
      backdrop-filter: blur(10px);
    }

    .pulse-dot {
      width: 8px;
      height: 8px;
      border-radius: 50%;
      background: #b3ff00;
      animation: pulse 1.5s ease-in-out infinite;
    }
    @keyframes pulse {
      0%, 100% { transform: scale(1); box-shadow: 0 0 0 0 rgba(179,255,0,0.4); }
      50% { transform: scale(1.5); box-shadow: 0 0 0 6px rgba(179,255,0,0); }
    }

    .headline {
      font-size: 24px;
      font-weight: 400;
      letter-spacing: -0.5px;
      color: #ffffff;
    }

    /* ── Social icons ── */
    .socials {
      display: flex;
      gap: 20px;
      margin-bottom: 32px;
    }
    .social-link {
      display: flex;
      align-items: center;
      justify-content: center;
      width: 48px;
      height: 48px;
      border-radius: 14px;
      background: rgba(255,255,255,0.03);
      border: 1px solid rgba(255,255,255,0.08);
      color: #ffffff;
      text-decoration: none;
      transition: all 0.3s ease;
    }
    .social-link:hover {
      background: rgba(255,255,255,0.08);
      border-color: rgba(179,255,0,0.4);
      color: #b3ff00;
      transform: translateY(-3px);
    }
    .social-link svg {
      width: 20px;
      height: 20px;
      fill: currentColor;
    }

    .footer-links {
      margin-bottom: 12px;
    }
    .footer-link {
      font-size: 13px;
      color: rgba(255,255,255,0.4);
      text-decoration: none;
      transition: color 0.2s ease;
    }
    .footer-link:hover {
      color: #b3ff00;
    }

    .copyright {
      font-size: 11px;
      color: rgba(255,255,255,0.2);
    }

    /* ── Responsive ── */
    @media (max-width: 768px) {
      .logo { width: 120px; }
      .tagline { font-size: 18px; }
      .screen-card {
        height: 380px;
        border-radius: 24px;
      }
      .showcase { margin: 20px 0; }
    }
    @media (max-width: 480px) {
      .screen-card {
        height: 320px;
        border-radius: 20px;
      }
    }
    
    /* Fade animations */
    .fade {
      opacity: 0;
      animation: fade-in 0.8s ease-out forwards;
    }
    .d-1 { animation-delay: 0.1s; }
    .d-2 { animation-delay: 0.2s; }
    .d-3 { animation-delay: 0.3s; }
    .d-4 { animation-delay: 0.4s; }
    .d-5 { animation-delay: 0.5s; }

    @keyframes fade-in {
      from { opacity: 0; transform: translateY(15px); }
      to { opacity: 1; transform: translateY(0); }
    }
  </style>
</head>
