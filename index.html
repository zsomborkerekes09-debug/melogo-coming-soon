<!DOCTYPE html>
<html lang="hu">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />

  <!-- SEO & Social -->
  <title>MeloGo — Hamarosan indul</title>
  <meta name="description" content="Az első magyar app ahol percek alatt találsz házkörüli munkát vagy megbízható munkást a közeledben." />
  <meta property="og:title" content="MeloGo — Hamarosan indul" />
  <meta property="og:description" content="Vállalj munkát a közeledben. Hamarosan elérhető." />
  <meta property="og:image" content="logo.jpg" />
  <meta name="theme-color" content="#060B20" />

  <!-- Font -->
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@200;300;400;600&display=swap" rel="stylesheet" />

  <style>
    /* ── Reset ── */
    *, *::before, *::after {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    /* ── Base ── */
    html, body {
      height: 100%;
      width: 100%;
      overflow-x: hidden;
    }

    body {
      font-family: 'Inter', sans-serif;
      background: linear-gradient(to bottom, #04040A 0%, #050918 50%, #060D22 100%);
      color: #ffffff;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      position: relative;
    }

    /* ── Background glow (subtle center bloom) ── */
    .bg-glow {
      position: fixed;
      inset: 0;
      pointer-events: none;
      z-index: 0;
      background: radial-gradient(ellipse 60% 45% at 50% 55%, rgba(8,18,48,0.9) 0%, transparent 70%);
      animation: glow-pulse 4s ease-in-out infinite;
    }
    @keyframes glow-pulse {
      0%, 100% { transform: scale(1);    opacity: 1; }
      50%       { transform: scale(1.08); opacity: 0.7; }
    }

    /* ── Page wrapper ── */
    .page {
      position: relative;
      z-index: 1;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      text-align: center;
      padding: 48px 24px 80px;
      width: 100%;
      min-height: 100vh;
    }

    /* ── Fade-in animation ── */
    .fade {
      opacity: 0;
      transform: translateY(18px);
      animation: fade-up 600ms ease-out forwards;
    }
    @keyframes fade-up {
      to { opacity: 1; transform: translateY(0); }
    }
    .d0  { animation-delay: 0ms; }
    .d1  { animation-delay: 150ms; }
    .d2  { animation-delay: 300ms; }
    .d3  { animation-delay: 450ms; }
    .d4  { animation-delay: 600ms; }
    .d5  { animation-delay: 750ms; }

    /* ── Logo ── */
    .logo {
      width: 220px;
      height: auto;
      display: block;
    }

    /* ── Separator ── */
    .separator {
      width: 120px;
      height: 1px;
      background: rgba(255,255,255,0.08);
      margin-top: 28px;
    }

    /* ── Tagline ── */
    .tagline {
      margin-top: 24px;
      font-size: 17px;
      font-weight: 300;
      letter-spacing: 0.01em;
      color: rgba(255,255,255,0.5);
    }

    /* ── Headline row ── */
    .headline-row {
      margin-top: 16px;
      display: flex;
      align-items: center;
      gap: 12px;
    }

    /* ── Pulse dot ── */
    .pulse-dot {
      flex-shrink: 0;
      width: 10px;
      height: 10px;
      border-radius: 50%;
      background: #16C45A;
      animation: pulse 1.5s ease-in-out infinite;
    }
    @keyframes pulse {
      0%, 100% { transform: scale(1);   box-shadow: 0 0 0   0 rgba(22,196,90,0.4); }
      50%       { transform: scale(1.3); box-shadow: 0 0 0 6px rgba(22,196,90,0);   }
    }

    /* ── Main headline ── */
    .headline {
      font-size: 46px;
      font-weight: 300;
      color: #ffffff;
      letter-spacing: -1.5px;
      line-height: 1.1;
    }

    /* ── Subtext ── */
    .subtext {
      margin-top: 16px;
      font-size: 15px;
      font-weight: 300;
      color: rgba(255,255,255,0.38);
      max-width: 400px;
      line-height: 1.7;
      letter-spacing: 0.01em;
    }

    /* ── Social icons ── */
    .socials {
      margin-top: 48px;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 20px;
    }

    .social-link {
      display: flex;
      align-items: center;
      justify-content: center;
      opacity: 0.6;
      text-decoration: none;
      transition: opacity 200ms ease;
      color: #ffffff;
    }
    .social-link:hover {
      opacity: 1;
    }
    .social-link svg {
      width: 24px;
      height: 24px;
      display: block;
      fill: currentColor;
    }

    /* ── Copyright ── */
    .copyright {
      position: fixed;
      bottom: 20px;
      left: 0;
      right: 0;
      text-align: center;
      font-size: 11px;
      color: rgba(255,255,255,0.25);
      letter-spacing: 0.03em;
    }

    /* ── Responsive ── */
    @media (max-width: 480px) {
      .logo      { width: 160px; }
      .headline  { font-size: 34px; letter-spacing: -1px; }
      .tagline   { font-size: 15px; }
      .subtext   { font-size: 14px; }
    }
  </style>
</head>
<body>

  <!-- Background glow -->
  <div class="bg-glow"></div>

  <!-- Page -->
  <main class="page" role="main">

    <!-- Logo -->
    <img
      class="logo fade d0"
      src="logo.jpg"
      alt="MeloGo logó"
    />

    <!-- Separator -->
    <div class="separator fade d0"></div>

    <!-- Tagline -->
    <p class="tagline fade d1">Vállalj munkát a közeledben.</p>

    <!-- Headline with pulse dot -->
    <div class="headline-row fade d2">
      <span class="pulse-dot" aria-hidden="true"></span>
      <h1 class="headline">Hamarosan indul</h1>
    </div>

    <!-- Subtext -->
    <p class="subtext fade d3">
      Az első magyar app ahol percek alatt találsz házkörüli munkát
      — vagy megbízható munkást a közeledben.
    </p>

    <!-- Social icons -->
    <nav class="socials fade d4" aria-label="Közösségi média">

      </a>

      <!-- Facebook -->
      <a
        id="link-facebook"
        class="social-link"
        href="https://www.facebook.com/profile.php?id=61590694168009"

        <svg viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">

    </nav>

  </main>

  <!-- Copyright -->
  <footer class="copyright fade d5">
    © 2026 MeloGo. Minden jog fenntartva.
  </footer>

</body>
</html>
